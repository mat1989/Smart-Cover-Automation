blueprint:
  name: Smart-Cover-Automation
  description: >
    Steuert ein Cover (Dachfenster oder Lamellenstoren) anhand von:
    - Wochentags-/Wochenend-Morgentriggern
    - Wettervorhersage (heiß / nicht heiß)
    - optionalem Sonnenstand (Azimut + Elevation)
    - Mittagsruhe
    - Abend-/Nacht-Schließen
    - optionalem Fenstersensor
    - globalem "do not move"-Schalter

    Verhalten:
    - Morgens: Wetter prüfen, dann entweder voll öffnen oder Teilöffnung/Kippstellung setzen
    - Optional nur dann Hitzeschutz anwenden, wenn die Sonne auf die Fassade scheint
    - Mittags: optional schließen, nach Dauer erneut Wetter prüfen und passend öffnen
    - Abends: optional schließen und bis morgens geschlossen lassen
    - Optionaler Fenstersensor:
      - Fenster auf + Cover geschlossen => Teilöffnung/Kippstellung
      - Fenster zu => wieder schließen
    - Wenn do_not_move = on: keine automatische Bewegung

    Annahmen:
    - input_datetime für die Dauer der Mittagsruhe enthält eine Zeit wie HH:MM oder HH:MM:SS
    - bei Lamellenstoren wird bei "heiß" die Tilt/Kipp-Position gesetzt

  domain: automation
  author: Matthias R.

  homeassistant:
    min_version: 2026.7.0

  input:
    cover_entity:
      name: Cover
      description: Das zu steuernde Cover
      selector:
        entity:
          domain: cover

    cover_type:
      name: Cover-Typ
      description: Dachfenster nutzt Teilöffnung, Lamellenstoren nutzt Kippstellung
      default: dachfenster
      selector:
        select:
          options:
            - label: Dachfenster
              value: dachfenster
            - label: Lamellenstoren
              value: lamellenstoren

    weather_entity:
      name: Wetter-Entity
      description: Wetter-Entity für die Tagesprognose
      selector:
        entity:
          domain: weather

    do_not_move_boolean:
      name: Do not move
      description: Wenn dieser Schalter auf ON steht, wird keine automatische Bewegung ausgeführt
      selector:
        entity:
          domain: input_boolean

    temperature_threshold_entity:
      name: Temperaturschwellenwert
      description: input_number für "zu heiß"
      selector:
        entity:
          domain: input_number

    partial_open_entity:
      name: Teilöffnung Dachfenster
      description: input_number für Teilöffnung des Dachfensters (0-100)
      selector:
        entity:
          domain: input_number

    tilt_position_entity:
      name: Kippstellung Lamellenstoren
      description: input_number für Lamellen-Kippstellung (0-100)
      selector:
        entity:
          domain: input_number

    weekday_morning_time:
      name: Morgentrigger werktags
      selector:
        entity:
          domain: input_datetime

    weekend_morning_time:
      name: Morgentrigger Wochenende
      selector:
        entity:
          domain: input_datetime

    midday_start_time:
      name: Bett geh Zeit Mittags / Start Mittagsruhe
      selector:
        entity:
          domain: input_datetime

    midday_duration:
      name: Dauer der Mittagsruhe
      description: input_datetime mit HH:MM oder HH:MM:SS, z. B. 01:30:00
      selector:
        entity:
          domain: input_datetime

    evening_close_time:
      name: Bett geh Zeit Abends
      selector:
        entity:
          domain: input_datetime

    enable_midday_close:
      name: Mittagsruhe aktiv
      description: Nur aktivieren, wenn dieses Cover mittags geschlossen werden soll
      default: true
      selector:
        boolean: {}

    enable_evening_close:
      name: Abends/Nachtschließen aktiv
      description: Nur aktivieren, wenn dieses Cover abends geschlossen werden soll
      default: true
      selector:
        boolean: {}

    enable_sun_condition:
      name: Sonnenbedingung aktiv
      description: Nur reagieren, wenn Sonne auf die Fassade scheint
      default: true
      selector:
        boolean: {}

    sun_azimuth_min:
      name: Azimut Minimum
      description: Startwinkel der Sonne in Grad
      default: 135
      selector:
        number:
          min: 0
          max: 360
          step: 1
          mode: box
          unit_of_measurement: "°"

    sun_azimuth_max:
      name: Azimut Maximum
      description: Endwinkel der Sonne in Grad
      default: 225
      selector:
        number:
          min: 0
          max: 360
          step: 1
          mode: box
          unit_of_measurement: "°"

    sun_min_elevation:
      name: Mindesthöhe Sonne
      description: Minimum Elevation, z. B. 10°
      default: 10
      selector:
        number:
          min: 0
          max: 90
          step: 1
          mode: box
          unit_of_measurement: "°"

    window_sensor:
      name: Optionaler Fenstersensor
      description: Optional. Wenn gesetzt, reagiert der Blueprint auf Fenster auf/zu.
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: false

mode: restart
max_exceeded: silent

trigger_variables:
  midday_start_entity: !input midday_start_time
  midday_duration_entity: !input midday_duration

triggers:
  - trigger: time
    at: !input weekday_morning_time
    id: morning_weekday

  - trigger: time
    at: !input weekend_morning_time
    id: morning_weekend

  - trigger: time
    at: !input midday_start_time
    id: midday_start

  - trigger: template
    id: midday_end
    value_template: >
      {% set start_raw = states(midday_start_entity) %}
      {% set duration_raw = states(midday_duration_entity) %}
      {% if start_raw not in ['unknown', 'unavailable', '', none]
            and duration_raw not in ['unknown', 'unavailable', '', none] %}
        {% set parts = duration_raw.split(':') %}
        {% set hours = parts[0] | int(0) %}
        {% set minutes = parts[1] | int(0) if parts | count > 1 else 0 %}
        {% set seconds = parts[2] | int(0) if parts | count > 2 else 0 %}
        {% set end = today_at(start_raw) + timedelta(hours=hours, minutes=minutes, seconds=seconds) %}
        {{ now().strftime('%H:%M') == end.strftime('%H:%M') }}
      {% else %}
        false
      {% endif %}

  - trigger: time
    at: !input evening_close_time
    id: evening_close

  - trigger: state
    entity_id: !input window_sensor
    to: "on"
    id: window_open

  - trigger: state
    entity_id: !input window_sensor
    to: "off"
    id: window_closed

variables:
  cover_entity_var: !input cover_entity
  cover_type_var: !input cover_type
  weather_entity_var: !input weather_entity
  do_not_move_var: !input do_not_move_boolean
  temp_threshold_var: !input temperature_threshold_entity
  partial_open_var: !input partial_open_entity
  tilt_position_var: !input tilt_position_entity
  enable_midday_close_var: !input enable_midday_close
  enable_evening_close_var: !input enable_evening_close
  enable_sun_condition_var: !input enable_sun_condition
  sun_azimuth_min_var: !input sun_azimuth_min
  sun_azimuth_max_var: !input sun_azimuth_max
  sun_min_elevation_var: !input sun_min_elevation

conditions: []

actions:
  - condition: state
    entity_id: !input do_not_move_boolean
    state: "off"

  - choose:
      # ------------------------------------------------------------
      # MORGENS WERKTAGS
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: morning_weekday
          - condition: template
            value_template: "{{ now().isoweekday() in [1, 2, 3, 4, 5] }}"
        sequence:
          - action: weather.get_forecasts
            target:
              entity_id: !input weather_entity
            data:
              type: daily
            response_variable: wx_daily

          - variables:
              is_hot_today: >
                {% set fc = wx_daily.get(weather_entity_var, {}).get('forecast', []) %}
                {% if fc | count > 0 and fc[0].get('temperature') is not none %}
                  {{ (fc[0].get('temperature') | float(0)) >= (states(temp_threshold_var) | float(26)) }}
                {% else %}
                  false
                {% endif %}
              sun_matches_facade: >
                {% if not enable_sun_condition_var %}
                  true
                {% else %}
                  {% set elevation = state_attr('sun.sun', 'elevation') | float(-90) %}
                  {% set azimuth = state_attr('sun.sun', 'azimuth') | float(0) %}
                  {% set min_az = sun_azimuth_min_var | float(135) %}
                  {% set max_az = sun_azimuth_max_var | float(225) %}
                  {% set min_el = sun_min_elevation_var | float(10) %}
                  {% set in_elevation = elevation >= min_el %}
                  {% if min_az <= max_az %}
                    {% set in_azimuth = azimuth >= min_az and azimuth <= max_az %}
                  {% else %}
                    {% set in_azimuth = azimuth >= min_az or azimuth <= max_az %}
                  {% endif %}
                  {{ in_elevation and in_azimuth }}
                {% endif %}

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_hot_today and sun_matches_facade }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'dachfenster' }}"
                        sequence:
                          - action: cover.set_cover_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              position: "{{ states(partial_open_var) | int(25) }}"

                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                        sequence:
                          - action: cover.set_cover_tilt_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              tilt_position: "{{ states(tilt_position_var) | int(50) }}"
            default:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity

      # ------------------------------------------------------------
      # MORGENS WOCHENENDE
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: morning_weekend
          - condition: template
            value_template: "{{ now().isoweekday() in [6, 7] }}"
        sequence:
          - action: weather.get_forecasts
            target:
              entity_id: !input weather_entity
            data:
              type: daily
            response_variable: wx_daily

          - variables:
              is_hot_today: >
                {% set fc = wx_daily.get(weather_entity_var, {}).get('forecast', []) %}
                {% if fc | count > 0 and fc[0].get('temperature') is not none %}
                  {{ (fc[0].get('temperature') | float(0)) >= (states(temp_threshold_var) | float(26)) }}
                {% else %}
                  false
                {% endif %}
              sun_matches_facade: >
                {% if not enable_sun_condition_var %}
                  true
                {% else %}
                  {% set elevation = state_attr('sun.sun', 'elevation') | float(-90) %}
                  {% set azimuth = state_attr('sun.sun', 'azimuth') | float(0) %}
                  {% set min_az = sun_azimuth_min_var | float(135) %}
                  {% set max_az = sun_azimuth_max_var | float(225) %}
                  {% set min_el = sun_min_elevation_var | float(10) %}
                  {% set in_elevation = elevation >= min_el %}
                  {% if min_az <= max_az %}
                    {% set in_azimuth = azimuth >= min_az and azimuth <= max_az %}
                  {% else %}
                    {% set in_azimuth = azimuth >= min_az or azimuth <= max_az %}
                  {% endif %}
                  {{ in_elevation and in_azimuth }}
                {% endif %}

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_hot_today and sun_matches_facade }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'dachfenster' }}"
                        sequence:
                          - action: cover.set_cover_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              position: "{{ states(partial_open_var) | int(25) }}"

                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                        sequence:
                          - action: cover.set_cover_tilt_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              tilt_position: "{{ states(tilt_position_var) | int(50) }}"
            default:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity

      # ------------------------------------------------------------
      # MITTAGS START -> SCHLIESSEN
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: midday_start
          - condition: template
            value_template: "{{ enable_midday_close_var }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity

      # ------------------------------------------------------------
      # MITTAGS ENDE -> WIEDER ÖFFNEN JE NACH WETTER + SONNE
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: midday_end
          - condition: template
            value_template: "{{ enable_midday_close_var }}"
        sequence:
          - action: weather.get_forecasts
            target:
              entity_id: !input weather_entity
            data:
              type: daily
            response_variable: wx_daily

          - variables:
              is_hot_today: >
                {% set fc = wx_daily.get(weather_entity_var, {}).get('forecast', []) %}
                {% if fc | count > 0 and fc[0].get('temperature') is not none %}
                  {{ (fc[0].get('temperature') | float(0)) >= (states(temp_threshold_var) | float(26)) }}
                {% else %}
                  false
                {% endif %}
              sun_matches_facade: >
                {% if not enable_sun_condition_var %}
                  true
                {% else %}
                  {% set elevation = state_attr('sun.sun', 'elevation') | float(-90) %}
                  {% set azimuth = state_attr('sun.sun', 'azimuth') | float(0) %}
                  {% set min_az = sun_azimuth_min_var | float(135) %}
                  {% set max_az = sun_azimuth_max_var | float(225) %}
                  {% set min_el = sun_min_elevation_var | float(10) %}
                  {% set in_elevation = elevation >= min_el %}
                  {% if min_az <= max_az %}
                    {% set in_azimuth = azimuth >= min_az and azimuth <= max_az %}
                  {% else %}
                    {% set in_azimuth = azimuth >= min_az or azimuth <= max_az %}
                  {% endif %}
                  {{ in_elevation and in_azimuth }}
                {% endif %}

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_hot_today and sun_matches_facade }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'dachfenster' }}"
                        sequence:
                          - action: cover.set_cover_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              position: "{{ states(partial_open_var) | int(25) }}"

                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                        sequence:
                          - action: cover.set_cover_tilt_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              tilt_position: "{{ states(tilt_position_var) | int(50) }}"
            default:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity

      # ------------------------------------------------------------
      # ABENDS -> SCHLIESSEN
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: evening_close
          - condition: template
            value_template: "{{ enable_evening_close_var }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity

      # ------------------------------------------------------------
      # FENSTER GEÖFFNET
      # Wenn Cover geschlossen ist -> Teilöffnung/Kippstellung
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: window_open
          - condition: template
            value_template: "{{ states(cover_entity_var) == 'closed' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ cover_type_var == 'dachfenster' }}"
                sequence:
                  - action: cover.set_cover_position
                    target:
                      entity_id: !input cover_entity
                    data:
                      position: "{{ states(partial_open_var) | int(25) }}"

              - conditions:
                  - condition: template
                    value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                sequence:
                  - action: cover.set_cover_tilt_position
                    target:
                      entity_id: !input cover_entity
                    data:
                      tilt_position: "{{ states(tilt_position_var) | int(50) }}"

      # ------------------------------------------------------------
      # FENSTER GESCHLOSSEN -> Cover wieder schließen
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: window_closed
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity
