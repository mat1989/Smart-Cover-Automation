blueprint:
  name: Smart-Cover-Automation
  description: >
    Steuert ein Cover (Dachfenster oder Lamellenstoren) anhand von:

    - Morgentrigger werktags / Wochenende
    - Wetter-Entity mit Attribut für Tages-Maximaltemperatur
    - Temperaturschwellenwert
    - optionalem Sonnenstand: Azimut + Elevation
    - Sperrzeit Nacht: von Bettgehzeit Abend bis Morgentrigger
    - Sperrzeit Mittag: von Bettgehzeit Mittag Start bis Bettgehzeit Mittag Ende
    - alle 15 Minuten Sollzustandsprüfung ausserhalb der Sperrzeiten
    - optionalem Fenstersensor
    - globalem "do not move"-Schalter

    Verhalten:

    - Morgens: Sollzustand wird anhand Maximaltemperatur und Sonne ermittelt
    - Tagsüber ausserhalb Sperrzeiten: alle 15 Minuten Sollzustand prüfen
    - Bei Hitze + Sonne auf Fassade:
      - Dachfenster: Teilöffnung
      - Lamellenstoren: Kippstellung
    - Wenn nicht heiss oder Sonne nicht relevant: Cover öffnen
    - Mittags: optional zu Beginn der Mittagszeit schliessen
    - Nach Ende der Mittagszeit: Sollzustand wird wieder ermittelt
    - Abends: optional bei Bettgehzeit schliessen
    - Optionaler Fenstersensor:
      - Fenster auf + Cover geschlossen => Teilöffnung/Kippstellung
      - Fenster zu => Sollzustand wird neu ermittelt
    - Wenn do_not_move = on: keine automatische Bewegung

  domain: automation
  author: Matthias R.

  homeassistant:
    min_version: 2026.7.0

  input:
    cover_entity:
      name: Cover
      description: Das zu steuernde Cover
      selector:
        entity:
          domain: cover

    cover_type:
      name: Cover-Typ
      description: Dachfenster nutzt Teilöffnung, Lamellenstoren nutzt Kippstellung
      default: dachfenster
      selector:
        select:
          options:
            - label: Dachfenster
              value: dachfenster
            - label: Lamellenstoren
              value: lamellenstoren

    weather_entity:
      name: Wetter-Entity
      description: Wetter-Entity mit Attribut für die maximale Tagestemperatur
      default: weather.weather_at_9444
      selector:
        entity:
          domain: weather

    temperature_threshold_entity:
      name: Temperaturschwellenwert
      description: input_number für "zu heiss"
      default: input_number.cover_temperatur_schwellenwert
      selector:
        entity:
          domain: input_number

    do_not_move_boolean:
      name: Do not move
      description: Wenn dieser Schalter auf ON steht, wird keine automatische Bewegung ausgeführt
      default: input_boolean.cover_do_not_move
      selector:
        entity:
          domain: input_boolean

    partial_open_entity:
      name: Teilöffnung Dachfenster
      description: input_number für Teilöffnung des Dachfensters (0-100)
      default: input_number.external_cover_teiloffnung
      selector:
        entity:
          domain: input_number

    tilt_position_entity:
      name: Kippstellung Lamellenstoren
      description: input_number für Lamellen-Kippstellung (0-100)
      default: input_number.storren_kippstellung
      selector:
        entity:
          domain: input_number

    weekday_morning_time:
      name: Morgentrigger Werktags
      default: input_datetime.cover_offnen_wochentags
      selector:
        entity:
          domain: input_datetime

    weekend_morning_time:
      name: Morgentrigger Wochenende
      default: input_datetime.cover_offnen_wochenende
      selector:
        entity:
          domain: input_datetime

    midday_start_time:
      name: Bettgehzeit Mittag Start
      description: Start der Mittags-Sperrzeit
      default: input_datetime.cover_bett_geh_zeit_mittag_start
      selector:
        entity:
          domain: input_datetime

    midday_end_time:
      name: Bettgehzeit Mittag Ende
      description: Ende der Mittags-Sperrzeit
      default: input_datetime.cover_bett_geh_zeit_mittag_ende
      selector:
        entity:
          domain: input_datetime

    evening_close_time:
      name: Bettgehzeit Abend
      description: Start der Nacht-Sperrzeit
      default: input_datetime.cover_bett_geh_zeit_abend
      selector:
        entity:
          domain: input_datetime

    close_before_midday:
      name: Vor Mittagszeit schliessen
      description: Wenn aktiv, wird das Cover zu Beginn der Mittagszeit geschlossen
      default: true
      selector:
        boolean: {}

    close_before_evening:
      name: Vor Bettgehzeit Abend schliessen
      description: Wenn aktiv, wird das Cover zur Bettgehzeit am Abend geschlossen
      default: true
      selector:
        boolean: {}

    enable_sun_condition:
      name: Sonnenbedingung aktiv
      description: Nur Hitzeschutz anwenden, wenn Sonne auf die Fassade scheint
      default: true
      selector:
        boolean: {}

    sun_azimuth_min:
      name: Azimut Minimum
      description: Startwinkel der Sonne in Grad
      default: 135
      selector:
        number:
          min: 0
          max: 360
          step: 1
          mode: box
          unit_of_measurement: "°"

    sun_azimuth_max:
      name: Azimut Maximum
      description: Endwinkel der Sonne in Grad
      default: 225
      selector:
        number:
          min: 0
          max: 360
          step: 1
          mode: box
          unit_of_measurement: "°"

    sun_min_elevation:
      name: Mindesthöhe Sonne
      description: Minimum Elevation, z. B. 10°
      default: 10
      selector:
        number:
          min: 0
          max: 90
          step: 1
          mode: box
          unit_of_measurement: "°"

    window_sensor:
      name: Optionaler Fenstersensor
      description: Optional. Wenn gesetzt, reagiert der Blueprint auf Fenster auf/zu.
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: false

mode: restart
max_exceeded: silent

triggers:
  - trigger: time
    at: !input weekday_morning_time
    id: morning_weekday

  - trigger: time
    at: !input weekend_morning_time
    id: morning_weekend

  - trigger: time_pattern
    minutes: "/15"
    id: periodic_check

  - trigger: time
    at: !input midday_start_time
    id: midday_start

  - trigger: time
    at: !input midday_end_time
    id: midday_end

  - trigger: time
    at: !input evening_close_time
    id: evening_close

  - trigger: state
    entity_id: !input window_sensor
    to: "on"
    id: window_open

  - trigger: state
    entity_id: !input window_sensor
    to: "off"
    id: window_closed

variables:
  cover_entity_var: !input cover_entity
  cover_type_var: !input cover_type

  weather_entity_var: !input weather_entity
  weather_temperature_attribute_var: !input weather_temperature_attribute
  temp_threshold_var: !input temperature_threshold_entity

  partial_open_var: !input partial_open_entity
  tilt_position_var: !input tilt_position_entity

  weekday_morning_time_var: !input weekday_morning_time
  weekend_morning_time_var: !input weekend_morning_time
  midday_start_time_var: !input midday_start_time
  midday_end_time_var: !input midday_end_time
  evening_close_time_var: !input evening_close_time

  close_before_midday_var: !input close_before_midday
  close_before_evening_var: !input close_before_evening

  enable_sun_condition_var: !input enable_sun_condition
  sun_azimuth_min_var: !input sun_azimuth_min
  sun_azimuth_max_var: !input sun_azimuth_max
  sun_min_elevation_var: !input sun_min_elevation

  max_temp_today: >
    {% set forecast = state_attr(weather_entity_var, 'forecast') %}

    {% if forecast and forecast | count > 0 %}
      {{ forecast[0].temperature | float(0) }}
    {% else %}
      0
    {% endif %}

  is_hot_today: >
    {{
      max_temp_today
      >=
      states(temp_threshold_var) | float(26)
    }}


  sun_matches_facade: >
    {% if not enable_sun_condition_var %}
      true
    {% else %}
      {% set elevation = state_attr('sun.sun', 'elevation') | float(-90) %}
      {% set azimuth = state_attr('sun.sun', 'azimuth') | float(0) %}
      {% set min_az = sun_azimuth_min_var | float(135) %}
      {% set max_az = sun_azimuth_max_var | float(225) %}
      {% set min_el = sun_min_elevation_var | float(10) %}
      {% set in_elevation = elevation >= min_el %}

      {% if min_az <= max_az %}
        {% set in_azimuth = azimuth >= min_az and azimuth <= max_az %}
      {% else %}
        {% set in_azimuth = azimuth >= min_az or azimuth <= max_az %}
      {% endif %}

      {{ in_elevation and in_azimuth }}
    {% endif %}

  is_heat_protection_required: >
    {{
      is_hot_today | bool(false)
      and
      sun_matches_facade | bool(false)
    }}

  active_morning_entity: >
    {% if now().isoweekday() in [6, 7] %}
      {{ weekend_morning_time_var }}
    {% else %}
      {{ weekday_morning_time_var }}
    {% endif %}

  is_night_blocked: >
    {% set now_time = now() %}
    {% set evening_raw = states(evening_close_time_var) %}
    {% set morning_raw = states(active_morning_entity | trim) %}

    {% if evening_raw in ['unknown', 'unavailable', '', none]
          or morning_raw in ['unknown', 'unavailable', '', none] %}
      false
    {% else %}
      {% set evening = today_at(evening_raw) %}
      {% set morning = today_at(morning_raw) %}

      {% if evening <= morning %}
        {{ now_time >= evening and now_time < morning }}
      {% else %}
        {{ now_time >= evening or now_time < morning }}
      {% endif %}
    {% endif %}

  is_midday_blocked: >
    {% set now_time = now() %}
    {% set start_raw = states(midday_start_time_var) %}
    {% set end_raw = states(midday_end_time_var) %}

    {% if start_raw in ['unknown', 'unavailable', '', none]
          or end_raw in ['unknown', 'unavailable', '', none] %}
      false
    {% else %}
      {% set start = today_at(start_raw) %}
      {% set end = today_at(end_raw) %}

      {% if start <= end %}
        {{ now_time >= start and now_time < end }}
      {% else %}
        {{ now_time >= start or now_time < end }}
      {% endif %}
    {% endif %}

  is_any_blocked_time: >
    {{
      is_night_blocked | bool(false)
      or
      is_midday_blocked | bool(false)
    }}

conditions: []

actions:
  - condition: state
    entity_id: !input do_not_move_boolean
    state: "off"

  - choose:
      # ------------------------------------------------------------
      # MORGENS WERKTAGS
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: morning_weekday
          - condition: template
            value_template: "{{ now().isoweekday() in [1, 2, 3, 4, 5] }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_heat_protection_required | bool(false) }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'dachfenster' }}"
                        sequence:
                          - action: cover.set_cover_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              position: "{{ states(partial_open_var) | int(25) }}"

                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                        sequence:
                          - action: cover.set_cover_tilt_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              tilt_position: "{{ states(tilt_position_var) | int(50) }}"
            default:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity

      # ------------------------------------------------------------
      # MORGENS WOCHENENDE
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: morning_weekend
          - condition: template
            value_template: "{{ now().isoweekday() in [6, 7] }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_heat_protection_required | bool(false) }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'dachfenster' }}"
                        sequence:
                          - action: cover.set_cover_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              position: "{{ states(partial_open_var) | int(25) }}"

                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                        sequence:
                          - action: cover.set_cover_tilt_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              tilt_position: "{{ states(tilt_position_var) | int(50) }}"
            default:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity

      # ------------------------------------------------------------
      # PERIODISCHE SOLLZUSTANDSPRÜFUNG
      # Alle 15 Minuten, aber nur ausserhalb der Sperrzeiten
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: periodic_check
          - condition: template
            value_template: "{{ not (is_any_blocked_time | bool(false)) }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_heat_protection_required | bool(false) }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'dachfenster' }}"
                        sequence:
                          - action: cover.set_cover_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              position: "{{ states(partial_open_var) | int(25) }}"

                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                        sequence:
                          - action: cover.set_cover_tilt_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              tilt_position: "{{ states(tilt_position_var) | int(50) }}"
            default:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity

      # ------------------------------------------------------------
      # MITTAG START
      # Optional vor Mittagszeit schliessen
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: midday_start
          - condition: template
            value_template: "{{ close_before_midday_var }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity

      # ------------------------------------------------------------
      # MITTAG ENDE
      # Sperrzeit endet, Sollzustand wird neu gesetzt
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: midday_end
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_heat_protection_required | bool(false) }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'dachfenster' }}"
                        sequence:
                          - action: cover.set_cover_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              position: "{{ states(partial_open_var) | int(25) }}"

                      - conditions:
                          - condition: template
                            value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                        sequence:
                          - action: cover.set_cover_tilt_position
                            target:
                              entity_id: !input cover_entity
                            data:
                              tilt_position: "{{ states(tilt_position_var) | int(50) }}"
            default:
              - action: cover.open_cover
                target:
                  entity_id: !input cover_entity

      # ------------------------------------------------------------
      # ABEND
      # Optional vor Bettgehzeit schliessen
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: evening_close
          - condition: template
            value_template: "{{ close_before_evening_var }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity

      # ------------------------------------------------------------
      # FENSTER GEÖFFNET
      # Wenn Cover geschlossen ist, dann Teilöffnung/Kippstellung
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: window_open
          - condition: template
            value_template: "{{ states(cover_entity_var) == 'closed' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ cover_type_var == 'dachfenster' }}"
                sequence:
                  - action: cover.set_cover_position
                    target:
                      entity_id: !input cover_entity
                    data:
                      position: "{{ states(partial_open_var) | int(25) }}"

              - conditions:
                  - condition: template
                    value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                sequence:
                  - action: cover.set_cover_tilt_position
                    target:
                      entity_id: !input cover_entity
                    data:
                      tilt_position: "{{ states(tilt_position_var) | int(50) }}"

      # ------------------------------------------------------------
      # FENSTER GESCHLOSSEN
      # Danach Sollzustand neu ermitteln
      # Sperrzeiten werden berücksichtigt
      # ------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: window_closed
        sequence:
          - choose:
              # Nacht-Sperrzeit und Abend-Schliessen aktiv:
              # Cover wieder schliessen
              - conditions:
                  - condition: template
                    value_template: >
                      {{
                        is_night_blocked | bool(false)
                        and
                        close_before_evening_var
                      }}
                sequence:
                  - action: cover.close_cover
                    target:
                      entity_id: !input cover_entity

              # Mittags-Sperrzeit und Mittag-Schliessen aktiv:
              # Cover wieder schliessen
              - conditions:
                  - condition: template
                    value_template: >
                      {{
                        is_midday_blocked | bool(false)
                        and
                        close_before_midday_var
                      }}
                sequence:
                  - action: cover.close_cover
                    target:
                      entity_id: !input cover_entity

            default:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ is_heat_protection_required | bool(false) }}"
                    sequence:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ cover_type_var == 'dachfenster' }}"
                            sequence:
                              - action: cover.set_cover_position
                                target:
                                  entity_id: !input cover_entity
                                data:
                                  position: "{{ states(partial_open_var) | int(25) }}"

                          - conditions:
                              - condition: template
                                value_template: "{{ cover_type_var == 'lamellenstoren' }}"
                            sequence:
                              - action: cover.set_cover_tilt_position
                                target:
                                  entity_id: !input cover_entity
                                data:
                                  tilt_position: "{{ states(tilt_position_var) | int(50) }}"
                default:
                  - action: cover.open_cover
                    target:
                      entity_id: !input cover_entity
